<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Bold colorful background — instantly recognizable in the Dock -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#2b5fdb"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded squircle background (macOS Big Sur+ shape) -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" fill="url(#bg)"/>

  <!-- Subtle inner highlight for depth -->
  <rect x="0" y="0" width="1024" height="512" rx="225"
        fill="white" fill-opacity="0.04"/>

  <!-- Single centered card. Bold silhouette reads cleanly at 16×16. -->
  <g filter="url(#cardShadow)" transform="translate(512 512) rotate(-6)">
    <!-- Card body -->
    <rect x="-260" y="-360" width="520" height="720" rx="48"
          fill="url(#cardBack)"/>
    <!-- Card border highlight -->
    <rect x="-260" y="-360" width="520" height="720" rx="48"
          fill="none" stroke="white" stroke-opacity="0.15" stroke-width="6"/>
    <!-- Inner art window — gives the silhouette of a real card -->
    <rect x="-220" y="-320" width="440" height="380" rx="20"
          fill="white" fill-opacity="0.20"/>
    <!-- Title bar suggestion -->
    <rect x="-220" y="80"  width="440" height="46" rx="10"
          fill="white" fill-opacity="0.22"/>
    <rect x="-220" y="148" width="440" height="20" rx="6"
          fill="white" fill-opacity="0.14"/>
    <rect x="-220" y="184" width="280" height="20" rx="6"
          fill="white" fill-opacity="0.14"/>
  </g>

  <!-- Green check badge in the corner — the "matcher" mark.
       Sits on top, well-contrasted, reads as ✓ even at 16×16. -->
  <g transform="translate(720 720)" filter="url(#cardShadow)">
    <circle cx="0" cy="0" r="170" fill="url(#badge)"/>
    <circle cx="0" cy="0" r="170" fill="none"
            stroke="white" stroke-opacity="0.35" stroke-width="10"/>
    <path d="M -75 5 L -15 65 L 80 -55"
          stroke="white" stroke-width="42" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
